spring:
  cloud:
    aws:
      s3:
        bucket: ${S3_BUCKET}
      region:
        static: ap-northeast-2
  config:
    import:
      - classpath:client-api-config.yml
  application:
    name: paymentSystemServer
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            scope:
              - profile_nickname
              - account_email
            client-name: kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

portone:
  api:
    # PortOne 서버 API 기본 주소
    base-url: ${PORTONE_API_BASE_URL}
    # 서버가 PortOne과 통신할 때 쓰는 비밀키
    secret: ${PORTONE_API_SECRET}
  store:
    # 브라우저 SDK 와 서버가 공통으로 쓰는 상점 ID
    id: ${PORTONE_STORE_ID}
  channel:
    # 일반 카드 결제용 KG이니시스 채널키
    kg-inicis: ${PORTONE_CHANNEL_KG}
    # billingKey 발급용 토스 페이먼츠 채널키
    toss: ${PORTONE_CHANNEL_TOSS}
  webhook:
    secret: ${PORTONE_WEBHOOK_SECRET}

app:
  ui:
    branding:
      app-name: CommerceHub
      tagline: 통합 커머스 플랫폼
      logo-text: 🏪 CommerceHub

server:
  forward-headers-strategy: framework