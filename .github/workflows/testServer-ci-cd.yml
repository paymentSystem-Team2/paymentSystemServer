name: testServer-ci-cd

on:
  push:
    branches: [dev]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set-image-meta.outputs.image_tag }}
      image_uri: ${{ steps.set-image-meta.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build test JAR
        run: ./gradlew bootJar -x test

      - name: Set image metadata
        id: set-image-meta
        run: |
          IMAGE_TAG=test-latest
          IMAGE_URI=${{ vars.DOCKERHUB_USERNAME }}/test

          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        run: |
          docker build --platform linux/arm64 \
            -t ${{ steps.set-image-meta.outputs.image_uri }}:${{ steps.set-image-meta.outputs.image_tag }} .

          docker push ${{ steps.set-image-meta.outputs.image_uri }}:${{ steps.set-image-meta.outputs.image_tag }}

          echo "✅ Pushed: ${{ steps.set-image-meta.outputs.image_uri }}:${{ steps.set-image-meta.outputs.image_tag }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Deploy to EC2
        run: |
          IMAGE_URI=${{ needs.build.outputs.image_uri }}
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}

          aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy test container from GitHub Actions" \
            --parameters "commands=[
              \"docker pull ${IMAGE_URI}:${IMAGE_TAG}\",
              \"docker stop server-1 server-2 || true\",
              \"docker rm server-1 server-2 || true\",
              \"docker run -d --restart unless-stopped --name server-1 -p 8080:8080 -e SPRING_PROFILES_ACTIVE=prod ${IMAGE_URI}:${IMAGE_TAG}\",
              \"docker run -d --restart unless-stopped --name server-2 -p 8081:8080 -e SPRING_PROFILES_ACTIVE=prod ${IMAGE_URI}:${IMAGE_TAG}\"
            ]" \
            --output text